<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sappho — 断片から旅を編む</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<main>
  <header>
    <img src="/sappho.jpg" alt="" class="sappho-portrait">
    <div class="header-text">
      <h1>Sappho</h1>
      <p class="tagline">断片から、旅を編む。</p>
    </div>
  </header>

  <section id="chat" aria-live="polite"></section>

  <form id="input-form" autocomplete="off">
    <textarea id="input" rows="2" placeholder="行き先や、今の気分を入力…" required></textarea>
    <button type="submit" id="send">送る</button>
  </form>

  <aside id="ode-panel" aria-label="Ode（議事録）">
    <div class="ode-header">
      <h2>Ode</h2>
      <div class="ode-actions">
        <button type="button" id="ode-new" title="新規オード">新規</button>
        <button type="button" id="ode-open" title="ファイルを開く">開く</button>
        <button type="button" id="ode-save-md" title="ダウンロード(.md)">.md</button>
        <button type="button" id="ode-save-txt" title="ダウンロード(.txt)">.txt</button>
      </div>
    </div>
    <textarea id="ode-content" spellcheck="false" placeholder="この旅のオード（議事）がここに記録されていきます。"></textarea>
    <p class="ode-status" id="ode-status" aria-live="polite"></p>
    <input type="file" id="ode-file-input" accept=".md,.txt,text/markdown,text/plain" hidden>
  </aside>
</main>
<script src="/app.js"></script>
</body>
</html>
